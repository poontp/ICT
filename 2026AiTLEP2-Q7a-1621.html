<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7(a) 循環隊列 (Circular Queue) 解析</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div id="root" class="w-full max-w-4xl"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Inline SVG Icons to replace lucide-react for standalone HTML
        const PlayIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        );
        const PauseIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
        );
        const SkipBackIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
        );
        const SkipForwardIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
        );
        const ChevronRightIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>
        );

        const CircularQueueAnimation = () => {
            const [activeTab, setActiveTab] = useState('ai');
            const [step, setStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const timerRef = useRef(null);

            // Data for (a)(i)
            const aiSteps = [
                {
                    title: "初始狀態",
                    desc: "目前隊列中有 4 個工作 (C=4)。front=3 指向第一個工作 'Memo'，rear=1 指向最後一個工作 'Invoice'。",
                    L: ["Report", "Invoice", "NA", "Memo", "Slides"],
                    C: 4, front: 3, rear: 1,
                    highlight: []
                },
                {
                    title: "執行 deq()",
                    desc: "移除並傳回 front (3) 的工作 'Memo'。front 向前移動一步 (3+1)%5 = 4。工作數量 C 減 1 變成 3。",
                    L: ["Report", "Invoice", "NA", "NA", "Slides"],
                    C: 3, front: 4, rear: 1,
                    highlight: [3]
                },
                {
                    title: "執行 enq('Draft')",
                    desc: "準備加入新工作。rear 向前移動一步 (1+1)%5 = 2。將 'Draft' 放入 L[2]。工作數量 C 加 1 變成 4。",
                    L: ["Report", "Invoice", "Draft", "NA", "Slides"],
                    C: 4, front: 4, rear: 2,
                    highlight: [2]
                },
                {
                    title: "執行 enq('Final')",
                    desc: "準備加入新工作。rear 向前移動一步 (2+1)%5 = 3。將 'Final' 放入 L[3]。工作數量 C 加 1 變成 5。隊列已滿。",
                    L: ["Report", "Invoice", "Draft", "Final", "Slides"],
                    C: 5, front: 4, rear: 3,
                    highlight: [3]
                },
                {
                    title: "最終答案",
                    desc: "完成所有操作後，陣列 L 的內容如上。(a1) Report, (a2) Invoice, (a3) Draft, (a4) Final, (a5) Slides。",
                    L: ["Report", "Invoice", "Draft", "Final", "Slides"],
                    C: 5, front: 4, rear: 3,
                    highlight: [0, 1, 2, 3, 4]
                }
            ];

            // Data for (a)(ii)
            const aiiSteps = [
                {
                    title: "分析 enq() 子程式",
                    desc: "這是一個將工作加入循環隊列的子程式。首先檢查隊列是否已滿 (C=5)。",
                    aii1: "", aii2: "",
                    highlightLine: 20
                },
                {
                    title: "更新 rear 索引",
                    desc: "如果隊列未滿，需要將新工作放入隊列尾部。在放入前，必須先更新 rear 的位置。因為是循環隊列，當 rear 達到陣列末端時要回到 0，所以使用 MOD 5。",
                    aii1: "rear ← (rear + 1) MOD 5", aii2: "",
                    highlightLine: 60
                },
                {
                    title: "更新工作數量 C",
                    desc: "將工作放入 L[rear] 後，隊列中的工作數量增加了 1，因此需要更新變量 C。",
                    aii1: "rear ← (rear + 1) MOD 5", aii2: "C ← C + 1",
                    highlightLine: 80
                }
            ];

            // Data for (a)(iii)
            const aiiiSteps = [
                {
                    title: "思考一般線性隊列的問題",
                    desc: "在非循環的線性隊列中，當不斷加入和移除元素後，front 會向後移動，導致陣列前方出現無法使用的空白空間（假性溢出）。"
                },
                {
                    title: "循環隊列的好處",
                    desc: "循環隊列將陣列的頭尾相連。當 rear 到達陣列末端時，可以繞回到陣列前端的空白位置，從而充分利用記憶體空間，避免假性溢出，且不需要移動陣列中的元素。"
                }
            ];

            const maxSteps = {
                'ai': aiSteps.length - 1,
                'aii': aiiSteps.length - 1,
                'aiii': aiiiSteps.length - 1
            };

            useEffect(() => {
                if (isPlaying) {
                    timerRef.current = setInterval(() => {
                        setStep((prev) => {
                            if (prev < maxSteps[activeTab]) {
                                return prev + 1;
                            } else {
                                setIsPlaying(false);
                                return prev;
                            }
                        });
                    }, 2500);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [isPlaying, activeTab]);

            const handleTabChange = (tab) => {
                setActiveTab(tab);
                setStep(0);
                setIsPlaying(false);
            };

            const currentData = activeTab === 'ai' ? aiSteps[step] : 
                                activeTab === 'aii' ? aiiSteps[step] : aiiiSteps[step];

            return (
                <div className="w-full p-6 bg-gray-50 rounded-xl shadow-lg font-sans">
                    <h2 className="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">7(a) 循環隊列 (Circular Queue) 解析</h2>
                    
                    {/* Tabs */}
                    <div className="flex flex-wrap gap-2 mb-6">
                        {[
                            { id: 'ai', label: '(a)(i) 隊列操作' },
                            { id: 'aii', label: '(a)(ii) 填補程式碼' },
                            { id: 'aiii', label: '(a)(iii) 循環隊列好處' }
                        ].map((tab) => (
                            <button
                                key={tab.id}
                                onClick={() => handleTabChange(tab.id)}
                                className={`px-4 py-2 rounded-lg font-medium transition-colors ${
                                    activeTab === tab.id 
                                        ? 'bg-blue-600 text-white shadow-md' 
                                        : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200'
                                }`}
                            >
                                {tab.label}
                            </button>
                        ))}
                    </div>

                    {/* Main Content Area */}
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 min-h-[400px] flex flex-col">
                        <div className="mb-4">
                            <h3 className="text-xl font-bold text-blue-800 flex items-center">
                                <ChevronRightIcon className="w-5 h-5 mr-1" />
                                {currentData.title}
                            </h3>
                            <p className="text-gray-600 mt-2 min-h-[3rem]">{currentData.desc}</p>
                        </div>

                        <div className="flex-grow flex items-center justify-center py-4 w-full overflow-x-auto">
                            {/* Content for (a)(i) */}
                            {activeTab === 'ai' && (
                                <div className="w-full max-w-2xl min-w-[500px]">
                                    <div className="flex justify-between mb-8 px-4 sm:px-8">
                                        <div className="bg-blue-50 px-4 py-2 rounded-lg border border-blue-200 text-center">
                                            <div className="text-sm text-blue-600 font-semibold">C (數量)</div>
                                            <div className="text-2xl font-bold text-blue-900">{currentData.C}</div>
                                        </div>
                                        <div className="bg-green-50 px-4 py-2 rounded-lg border border-green-200 text-center">
                                            <div className="text-sm text-green-600 font-semibold">front (首項)</div>
                                            <div className="text-2xl font-bold text-green-900">{currentData.front}</div>
                                        </div>
                                        <div className="bg-purple-50 px-4 py-2 rounded-lg border border-purple-200 text-center">
                                            <div className="text-sm text-purple-600 font-semibold">rear (尾項)</div>
                                            <div className="text-2xl font-bold text-purple-900">{currentData.rear}</div>
                                        </div>
                                    </div>

                                    <div className="relative pt-8">
                                        <div className="flex justify-between w-full">
                                            {currentData.L.map((item, index) => (
                                                <div key={index} className="flex flex-col items-center w-1/5 relative">
                                                    {/* Pointers */}
                                                    <div className="h-8 mb-2 relative w-full flex justify-center">
                                                        {currentData.front === index && (
                                                            <div className="absolute bottom-0 text-green-600 font-bold text-sm flex flex-col items-center animate-bounce">
                                                                <span>front</span>
                                                                <span>↓</span>
                                                            </div>
                                                        )}
                                                        {currentData.rear === index && (
                                                            <div className="absolute bottom-0 text-purple-600 font-bold text-sm flex flex-col items-center animate-bounce" style={{ marginTop: currentData.front === index ? '-30px' : '0' }}>
                                                                <span>rear</span>
                                                                <span>↓</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                    
                                                    {/* Array Cell */}
                                                    <div className={`w-16 h-16 sm:w-20 sm:h-20 flex items-center justify-center border-2 rounded-lg text-sm sm:text-lg font-bold transition-all duration-500 ${
                                                        currentData.highlight.includes(index) ? 'bg-yellow-100 border-yellow-400 scale-110 shadow-md' : 
                                                        item === 'NA' ? 'bg-gray-50 border-gray-200 text-gray-400' : 'bg-white border-gray-400 text-gray-800'
                                                    }`}>
                                                        {item}
                                                    </div>
                                                    <div className="mt-2 text-gray-500 font-mono text-sm">i={index}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Content for (a)(ii) */}
                            {activeTab === 'aii' && (
                                <div className="w-full max-w-lg bg-gray-900 rounded-lg p-4 sm:p-6 font-mono text-xs sm:text-sm shadow-inner overflow-x-auto">
                                    <div className="text-gray-300 min-w-[350px]">
                                        <div className="flex"><span className="w-8 text-gray-500">10</span> <span className="text-blue-400">enq</span>(job_name)</div>
                                        <div className={`flex ${currentData.highlightLine === 20 ? 'bg-gray-800 -mx-2 px-2 rounded' : ''}`}><span className="w-8 text-gray-500">20</span> &nbsp;&nbsp;<span className="text-purple-400">如果</span> C = 5 <span className="text-purple-400">則</span></div>
                                        <div className="flex"><span className="w-8 text-gray-500">30</span> &nbsp;&nbsp;&nbsp;&nbsp;輸出 'Print Queue is Full!'</div>
                                        <div className="flex"><span className="w-8 text-gray-500">40</span> &nbsp;&nbsp;&nbsp;&nbsp;<span className="text-purple-400">傳回</span> -1</div>
                                        <div className="flex"><span className="w-8 text-gray-500">50</span> &nbsp;&nbsp;<span className="text-purple-400">否則</span></div>
                                        
                                        <div className={`flex items-center my-1 ${currentData.highlightLine === 60 ? 'bg-gray-800 -mx-2 px-2 py-1 rounded' : ''}`}>
                                            <span className="w-8 text-gray-500">60</span> 
                                            &nbsp;&nbsp;&nbsp;&nbsp;
                                            <span className="bg-white text-black px-2 py-0.5 rounded min-w-[150px] sm:min-w-[200px] inline-block font-bold text-center">
                                                {currentData.aii1 || "(aii1)"}
                                            </span>
                                        </div>
                                        
                                        <div className="flex"><span className="w-8 text-gray-500">70</span> &nbsp;&nbsp;&nbsp;&nbsp;L[rear] ← job_name</div>
                                        
                                        <div className={`flex items-center my-1 ${currentData.highlightLine === 80 ? 'bg-gray-800 -mx-2 px-2 py-1 rounded' : ''}`}>
                                            <span className="w-8 text-gray-500">80</span> 
                                            &nbsp;&nbsp;&nbsp;&nbsp;
                                            <span className="bg-white text-black px-2 py-0.5 rounded min-w-[150px] sm:min-w-[200px] inline-block font-bold text-center">
                                                {currentData.aii2 || "(aii2)"}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Content for (a)(iii) */}
                            {activeTab === 'aiii' && (
                                <div className="w-full max-w-2xl text-center">
                                    <div className="bg-blue-50 border-l-4 border-blue-500 p-6 rounded-r-lg shadow-sm text-left">
                                        <h4 className="text-lg font-bold text-blue-800 mb-2">標準答案：</h4>
                                        <p className="text-gray-800 text-lg">
                                            {step === 0 ? "..." : "可以重複使用陣列前端已被移出的空白空間，避免假性溢出，提高記憶體使用率。"}
                                        </p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Controls */}
                    <div className="mt-6 flex flex-col sm:flex-row items-center justify-between bg-white p-4 rounded-xl shadow-sm border border-gray-100 gap-4">
                        <div className="text-sm font-medium text-gray-500">
                            步驟 {step + 1} / {maxSteps[activeTab] + 1}
                        </div>
                        
                        <div className="flex space-x-2 sm:space-x-3">
                            <button 
                                onClick={() => { setIsPlaying(false); setStep(Math.max(0, step - 1)); }}
                                disabled={step === 0}
                                className="flex items-center px-3 py-2 sm:px-4 bg-gray-100 hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg text-gray-700 transition-colors text-sm sm:text-base"
                            >
                                <SkipBackIcon className="w-4 h-4 mr-1 sm:mr-2" />
                                上一步
                            </button>
                            
                            <button 
                                onClick={() => setIsPlaying(!isPlaying)}
                                disabled={step === maxSteps[activeTab]}
                                className={`flex items-center px-4 py-2 sm:px-6 rounded-lg text-white transition-colors text-sm sm:text-base ${
                                    isPlaying ? 'bg-red-500 hover:bg-red-600' : 'bg-blue-600 hover:bg-blue-700'
                                } disabled:opacity-50 disabled:cursor-not-allowed`}
                            >
                                {isPlaying ? (
                                    <><PauseIcon className="w-4 h-4 mr-1 sm:mr-2" /> 暫停</>
                                ) : (
                                    <><PlayIcon className="w-4 h-4 mr-1 sm:mr-2" /> 自動播放</>
                                )}
                            </button>
                            
                            <button 
                                onClick={() => { setIsPlaying(false); setStep(Math.min(maxSteps[activeTab], step + 1)); }}
                                disabled={step === maxSteps[activeTab]}
                                className="flex items-center px-3 py-2 sm:px-4 bg-gray-100 hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg text-gray-700 transition-colors text-sm sm:text-base"
                            >
                                下一步
                                <SkipForwardIcon className="w-4 h-4 ml-1 sm:ml-2" />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CircularQueueAnimation />);
    </script>
</body>
</html>
